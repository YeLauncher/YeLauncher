name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers ONLY when a tag starting with 'v' is pushed (e.g., v1.0.0)

jobs:
  check-version:
    name: Verify Pubspec Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract and Compare Version
        run: |
          # Extract version from pubspec.yaml (e.g., "1.0.0+1" -> "1.0.0")
          PUBSPEC_VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1 | tr -d '\r')
          
          # Extract version from the GitHub tag (e.g., "v1.0.0" -> "1.0.0")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          
          echo "Tag Version: $TAG_VERSION"
          echo "Pubspec Version: $PUBSPEC_VERSION"
          
          # Fail the job if they do not match
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pubspec.yaml version ($PUBSPEC_VERSION)."
            exit 1
          fi
          echo "Versions match! Proceeding to build."

  build:
    needs: check-version # Only runs if the version check passes
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            extension: msix

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' 

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows MSIX
        if: matrix.platform == 'windows'
        run: flutter pub run msix:create

      - name: Rename Output File
        shell: bash 
        run: |
          cp build/windows/x64/runner/Release/yelauncher.msix yelauncher-windows.msix

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yelauncher-${{ matrix.platform }}
          path: yelauncher-windows.msix

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yelauncher-windows.msix
          generate_release_notes: true
